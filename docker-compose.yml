version: '3.8'

networks:
  cinepurr_net:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    networks:
      - cinepurr_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  socket_server:
    build:
      context: .
      dockerfile: Dockerfile.server
    # Removed exposed host ports to route all traffic securely through Nginx
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    networks:
      - cinepurr_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:4000" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
    # Removed exposed host ports to route all traffic securely through Nginx
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - REDIS_URL=redis://redis:6379
      - SOCKET_SERVER_INTERNAL_URL=http://socket_server:4000
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    networks:
      - cinepurr_net
    depends_on:
      redis:
        condition: service_healthy
      socket_server:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - cinepurr_net
    depends_on:
      - nextjs
      - socket_server
    restart: always
