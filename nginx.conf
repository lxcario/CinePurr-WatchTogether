events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # HTTP Server (Port 80)
    server {
        listen 80;
        server_name cinepurr.me www.cinepurr.me;

        # Challenge location for Certbot (if using webroot mode)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server (Port 443)
    server {
        listen 443 ssl;
        server_name cinepurr.me www.cinepurr.me;

        # SSL Certificates (Managed by Certbot, stored in named volume)
        ssl_certificate /etc/letsencrypt/live/cinepurr.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cinepurr.me/privkey.pem;

        # Recommended SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Proxy Next.js application
        location / {
            proxy_pass http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Socket.io with WebSocket upgrade headers
        location /socket.io/ {
            proxy_pass http://socket_server:4000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Additional Socket.IO specific settings
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
