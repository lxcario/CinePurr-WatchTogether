name: cinepurr-frontend
region: nyc
services:
  - name: web
    github:
      repo: lxcario/CinePurr
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npx prisma generate && node scripts/fix-stuck-migration.js && npx prisma migrate deploy && npm run build
    run_command: npm start
    environment_slug: node-js
    ignore_files:
      - Procfile
      - railway.json
      - vercel.json
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXTAUTH_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXTAUTH_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_SOCKET_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: YOUTUBE_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: TMDB_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

