name: Deploy to Droplet

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

    steps:
      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "Missing secret: DEPLOY_HOST" >&2
            exit 1
          fi

          if [ -z "${DEPLOY_USER:-}" ]; then
            echo "Missing secret: DEPLOY_USER" >&2
            exit 1
          fi

          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "Missing secret: DEPLOY_SSH_KEY" >&2
            exit 1
          fi

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail

          PORT="${DEPLOY_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        shell: bash
        run: |
          set -euo pipefail

          PORT="${DEPLOY_PORT:-22}"
          TARGET_PATH="${DEPLOY_PATH:-/root/CinePurr}"

          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail && \
            cd \"$TARGET_PATH\" && \
            git fetch origin main && \
            git checkout main && \
            git pull --ff-only origin main && \
            docker compose up -d --build --remove-orphans && \
            docker compose ps"
