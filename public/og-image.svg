<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#ec4899" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#6366f1" opacity="0.1"/>
  <circle cx="600" cy="315" r="250" fill="#a855f7" opacity="0.05"/>
  
  <!-- Cat emoji -->
  <text x="600" y="220" font-size="120" text-anchor="middle">🐱</text>
  
  <!-- Main title -->
  <text x="600" y="350" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="url(#text-gradient)" text-anchor="middle">CinePurr</text>
  
  <!-- Tagline -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="32" fill="#e2e8f0" text-anchor="middle">Watch Movies Together</text>
  
  <!-- Subtitle -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">Real-time synchronized video watching with friends</text>
  
  <!-- Feature icons -->
  <text x="380" y="560" font-size="36" text-anchor="middle">🎬</text>
  <text x="480" y="560" font-size="36" text-anchor="middle">💬</text>
  <text x="580" y="560" font-size="36" text-anchor="middle">👥</text>
  <text x="680" y="560" font-size="36" text-anchor="middle">🎉</text>
  <text x="780" y="560" font-size="36" text-anchor="middle">🏆</text>
</svg>
